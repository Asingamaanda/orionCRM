version: '3.9'
services:
  api:
    build: .
    ports: ["8000:8000"]
    environment:
      - DATABASE_URL=postgresql+psycopg://orion:orion@db:5432/orion
      - JWT_SECRET=change-in-production
    depends_on: [db]
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: orion
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: orion
    ports: ["5432:5432"]
